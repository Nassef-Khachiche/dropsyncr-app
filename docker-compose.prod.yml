version: '3.8'
services:
  # Backend Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dropsyncr-backend-prod
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "5000:5000"
    volumes:
      - label_storage:/app/storage/labels
    networks:
      - dropsyncr-network
    command: sh -c "npx prisma generate && npx prisma db push && npm start"
  # Frontend (Production Build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: dropsyncr-frontend-prod
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dropsyncr-network
networks:
  dropsyncr-network:
    driver: bridge
volumes:
  mysql_data_prod:
  label_storage: